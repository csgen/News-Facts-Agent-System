# Build the Docker image and publish it to GitHub Container Registry (GHCR).
#
# Triggers:
#   - push to `main`             → tag image as `:latest` and `:sha-<short>`
#   - push of a tag matching v*  → ALSO tag image as the version (e.g. `:v0.1.0`)
#                                  and re-tag `:latest` to point at it
#
# Auth uses the auto-provided GITHUB_TOKEN — no manual secrets needed.
# Image is published under: ghcr.io/<owner>/news_facts_system

name: Release Image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch: {}

# Don't stack overlapping builds on rapid pushes; cancel any in-flight build
# for the same ref when a new commit lands.
concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN needs `packages: write` to push to GHCR.
permissions:
  contents: read
  packages: write

jobs:

  build-and-push:
    name: Build + push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          # Repository name → ghcr.io/<owner>/<repo>
          images: ghcr.io/${{ github.repository }}
          # Tag rules:
          #   - `latest` only on default branch (main)
          #   - `sha-<short>` always
          #   - `vX.Y.Z` when triggered by a v*.*.* tag
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache the slow `pip install` layer between runs via GitHub Actions cache.
          # First run is full speed (~5-10 min); subsequent runs hit cache (~1-2 min).
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Smoke test: pull the just-published image and run a few sanity checks ─
  # Catches container-only runtime issues that unit tests can mask:
  #   - Imports succeed under the actual PYTHONPATH baked into the image
  #   - MemoryAgent can connect to a real (sidecar) Neo4j and Chroma
  #   - Cypher schema applies cleanly
  #   - Round-trip write/read against both stores works
  #   - Streamlit can boot the UI and answer its health endpoint
  #
  # Free (~3-5 min including image pull). No live API keys needed — everything
  # runs against ephemeral sidecar containers.
  smoke:
    name: Smoke test on published image
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 8

    services:
      neo4j:
        image: neo4j:5-community
        ports: ['7687:7687', '7474:7474']
        env:
          NEO4J_AUTH: neo4j/smoketest123
        options: >-
          --health-cmd "cypher-shell -u neo4j -p smoketest123 'RETURN 1'"
          --health-interval 5s
          --health-retries 30
          --health-timeout 5s

      chroma:
        image: chromadb/chroma:latest
        ports: ['8000:8000']
        # Intentionally NO --health-cmd here. chromadb/chroma:latest has no
        # `curl` installed, and the heartbeat endpoint moved from /api/v1 to
        # /api/v2 across versions, so any in-container healthcheck we write
        # is brittle. We poll explicitly from the runner in the first step
        # below (curl IS available on ubuntu-latest, and we can try both
        # endpoint paths to stay version-agnostic).

    env:
      # IMAGE is set dynamically below — Docker requires the repo path to be
      # lowercase, but ${{ github.repository }} preserves the original case.
      # If your repo is `Owner/My-Project`, the literal expansion would yield
      # `ghcr.io/Owner/My-Project:sha-...` which `docker pull` rejects with
      # "invalid reference format". So we compute it once via $GITHUB_ENV.

      # Shared by Smoke 2/3/4 — sidecar service hostnames are reachable from
      # the runner over `localhost` thanks to GitHub's automatic port forwarding.
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: smoketest123
      CHROMA_HOST: localhost
      CHROMA_PORT: '8000'
      OPENAI_API_KEY: dummy-not-used
      GOOGLE_API_KEY: ''

    steps:
      - name: Compute image reference (lowercased + short SHA)
        # Two transforms vs the literal ${{ github.repository }}:sha-${{ github.sha }}:
        #   1. ${VAR,,}        — lowercase the repo path (Docker requires it)
        #   2. ${GITHUB_SHA:0:7} — short SHA, matching docker/metadata-action's
        #                          default `type=sha,prefix=sha-` behaviour
        #                          (7 chars, not the full 40). Without this,
        #                          docker pull fails with "manifest unknown".
        # Writing to $GITHUB_ENV makes $IMAGE visible to every later step.
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:sha-${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Wait for Chroma to be ready (heartbeat poll)
        run: |
          # Poll Chroma's heartbeat endpoint from the runner. Try v2 first
          # (current Chroma), fall back to v1 (older images). We do this
          # outside the container because `chromadb/chroma:latest` doesn't
          # ship with curl and the API path is version-dependent.
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/api/v2/heartbeat >/dev/null 2>&1 \
               || curl -fsS http://localhost:8000/api/v1/heartbeat >/dev/null 2>&1; then
              echo "Chroma is ready (after ${i} polls)"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Chroma did not become ready within 120s"
          docker ps --filter "ancestor=chromadb/chroma:latest" --format '{{.ID}}' \
            | xargs -r -I{} docker logs --tail 50 {}
          exit 1

      - name: Pull just-built image
        run: docker pull "$IMAGE"

      - name: Smoke 1 — imports work in the container
        run: |
          docker run --rm "$IMAGE" python -c "
          from src.memory.agent import MemoryAgent
          from agents.fact_check_agent import fact_check_claim
          from agents.memory_agent import get_memory
          print('IMPORT OK')
          "

      - name: Smoke 2 — schema init against sidecar Neo4j
        run: |
          docker run --rm --network host \
            -e NEO4J_URI -e NEO4J_USER -e NEO4J_PASSWORD \
            -e CHROMA_HOST -e CHROMA_PORT \
            -e OPENAI_API_KEY -e GOOGLE_API_KEY \
            "$IMAGE" python -c "
          from src.config import settings
          from src.memory.agent import MemoryAgent
          MemoryAgent(settings).init_schema()
          print('SCHEMA OK')
          "

      - name: Smoke 3 — round-trip write/read on Neo4j + Chroma
        run: |
          docker run --rm --network host \
            -e NEO4J_URI -e NEO4J_USER -e NEO4J_PASSWORD \
            -e CHROMA_HOST -e CHROMA_PORT \
            -e OPENAI_API_KEY -e GOOGLE_API_KEY \
            "$IMAGE" python -c "
          from src.config import settings
          from src.memory.agent import MemoryAgent
          m = MemoryAgent(settings)
          m._graph.ensure_entity_exists('SmokeTestEntity')
          ent = m.get_entity_by_name('SmokeTestEntity')
          assert ent is not None and ent['name'].lower() == 'smoketestentity', ent
          print('ROUND-TRIP OK')
          "

      - name: Smoke 4 — Streamlit health endpoint
        run: |
          docker run -d --name nfs-smoke-ui --network host \
            -e NEO4J_URI -e NEO4J_USER -e NEO4J_PASSWORD \
            -e CHROMA_HOST -e CHROMA_PORT \
            -e OPENAI_API_KEY -e GOOGLE_API_KEY \
            "$IMAGE" sh -c "cd /app/PredictionAgent && streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true"

          # Streamlit takes ~10-30s to fully boot; poll its health endpoint.
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8501/_stcore/health >/dev/null 2>&1; then
              echo "STREAMLIT OK"
              docker stop nfs-smoke-ui >/dev/null
              exit 0
            fi
            sleep 2
          done
          echo "Streamlit failed to boot; container logs:"
          docker logs nfs-smoke-ui
          docker stop nfs-smoke-ui >/dev/null
          exit 1
