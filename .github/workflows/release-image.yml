# Build the Docker image and publish it to GitHub Container Registry (GHCR).
#
# Triggers:
#   - push to `main`             → tag image as `:latest` and `:sha-<short>`
#   - push of a tag matching v*  → ALSO tag image as the version (e.g. `:v0.1.0`)
#                                  and re-tag `:latest` to point at it
#
# Auth uses the auto-provided GITHUB_TOKEN — no manual secrets needed.
# Image is published under: ghcr.io/<owner>/news_facts_system

name: Release Image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch: {}

# Don't stack overlapping builds on rapid pushes; cancel any in-flight build
# for the same ref when a new commit lands.
concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN needs `packages: write` to push to GHCR.
permissions:
  contents: read
  packages: write

jobs:

  build-and-push:
    name: Build + push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          # Repository name → ghcr.io/<owner>/<repo>
          images: ghcr.io/${{ github.repository }}
          # Tag rules:
          #   - `latest` only on default branch (main)
          #   - `sha-<short>` always
          #   - `vX.Y.Z` when triggered by a v*.*.* tag
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache the slow `pip install` layer between runs via GitHub Actions cache.
          # First run is full speed (~5-10 min); subsequent runs hit cache (~1-2 min).
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Smoke test: pull the just-published image and run a few sanity checks ─
  # Pulls the just-published image from GHCR and runs the same 5 smoke
  # checks the PR pipeline ran (defined in .github/actions/run-smokes).
  # See that action for the full check list and rationale.
  #
  # Free (~3-5 min including image pull). No live API keys needed — everything
  # runs against ephemeral sidecar containers.
  smoke:
    name: Smoke test on published image
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 8

    services:
      neo4j:
        image: neo4j:5-community
        ports: ['7687:7687', '7474:7474']
        env:
          NEO4J_AUTH: neo4j/smoketest123
        options: >-
          --health-cmd "cypher-shell -u neo4j -p smoketest123 'RETURN 1'"
          --health-interval 5s
          --health-retries 30
          --health-timeout 5s

      chroma:
        image: chromadb/chroma:latest
        ports: ['8000:8000']
        # Intentionally NO --health-cmd here. chromadb/chroma:latest has no
        # `curl` installed, and the heartbeat endpoint moved from /api/v1 to
        # /api/v2 across versions, so any in-container healthcheck we write
        # is brittle. The composite action polls explicitly from the runner
        # (curl IS available on ubuntu-latest, and we can try both endpoint
        # paths to stay version-agnostic).

    env:
      # IMAGE is set dynamically below — Docker requires the repo path to be
      # lowercase, but ${{ github.repository }} preserves the original case.
      # If your repo is `Owner/My-Project`, the literal expansion would yield
      # `ghcr.io/Owner/My-Project:sha-...` which `docker pull` rejects with
      # "invalid reference format". So we compute it once via $GITHUB_ENV.

      # Sidecar service hostnames are reachable from the runner over
      # `localhost` thanks to GitHub's automatic port forwarding. The
      # composite action's docker run steps forward these into each smoke
      # container via -e flags.
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: smoketest123
      CHROMA_HOST: localhost
      CHROMA_PORT: '8000'
      OPENAI_API_KEY: dummy-not-used
      # Non-empty dummy to avoid `genai.Client(api_key="")` raising in some
      # google-genai SDK versions. No real call is ever made by the smokes.
      GOOGLE_API_KEY: dummy-not-used

    steps:
      # Checkout is required so the runner can resolve the local composite
      # action at .github/actions/run-smokes/ — `uses: ./...` reads the
      # action.yml from the workspace, not the published image.
      - uses: actions/checkout@v6

      - name: Compute image reference (lowercased + short SHA)
        # Two transforms vs the literal ${{ github.repository }}:sha-${{ github.sha }}:
        #   1. ${VAR,,}        — lowercase the repo path (Docker requires it)
        #   2. ${GITHUB_SHA:0:7} — short SHA, matching docker/metadata-action's
        #                          default `type=sha,prefix=sha-` behaviour
        #                          (7 chars, not the full 40). Without this,
        #                          docker pull fails with "manifest unknown".
        # Writing to $GITHUB_ENV makes $IMAGE visible to every later step.
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:sha-${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Pull just-built image
        run: docker pull "$IMAGE"

      - name: Run image smokes
        uses: ./.github/actions/run-smokes
        with:
          image: ${{ env.IMAGE }}
