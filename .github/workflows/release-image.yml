# Build the Docker image and publish it to GitHub Container Registry (GHCR).
#
# Triggers:
#   - push to `main`             → tag image as `:latest` and `:sha-<short>`
#   - push of a tag matching v*  → ALSO tag image as the version (e.g. `:v0.1.0`)
#                                  and re-tag `:latest` to point at it
#
# Auth uses the auto-provided GITHUB_TOKEN — no manual secrets needed.
# Image is published under: ghcr.io/<owner>/news_facts_system

name: Release Image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch: {}

# Don't stack overlapping builds on rapid pushes; cancel any in-flight build
# for the same ref when a new commit lands.
concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN needs `packages: write` to push to GHCR.
permissions:
  contents: read
  packages: write

jobs:

  build-and-push:
    name: Build + push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Repository name → ghcr.io/<owner>/<repo>
          images: ghcr.io/${{ github.repository }}
          # Tag rules:
          #   - `latest` only on default branch (main)
          #   - `sha-<short>` always
          #   - `vX.Y.Z` when triggered by a v*.*.* tag
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache the slow `pip install` layer between runs via GitHub Actions cache.
          # First run is full speed (~5-10 min); subsequent runs hit cache (~1-2 min).
          cache-from: type=gha
          cache-to: type=gha,mode=max
