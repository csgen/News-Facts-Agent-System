# Twice-weekly health probes against the live external APIs we depend on.
#
# Catches:
#   - Vendor API drift (e.g. OpenAI deprecates a field, Gemini changes embedding shape)
#   - Auth issues (expired keys, suspended account, downgraded plan)
#   - Quota / rate-limit changes (free-tier knocked to a lower threshold)
#   - Network path issues from GitHub runners to provider endpoints
#
# Costs ~$0.05 per run. Two runs per week (Mon + Thu) → ~$0.50/month.
#
# Failure → GitHub auto-emails the workflow owner. No additional alerting wired up.

name: API Health Check

on:
  schedule:
    - cron: '0 8 * * 1,4'   # Monday + Thursday at 08:00 UTC
  workflow_dispatch: {}

# Only one health-check run at a time per ref. A scheduled run still in flight
# when a manual run is triggered cancels the manual one to keep behaviour
# predictable.
concurrency:
  group: health-check
  cancel-in-progress: false

jobs:
  health:
    name: Probe live APIs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12 with pip cache
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install only the SDKs the probes need
        run: |
          python -m pip install --upgrade pip
          # Slim install — no torch/transformers/spaCy needed for health probes.
          pip install \
            'pytest>=8.0,<9.0' \
            'openai>=2.0,<3.0' \
            'google-genai>=0.8.0' \
            'tavily-python>=0.3' \
            'neo4j>=5.0,<6.0' \
            'chromadb>=1.0.0,<2.0'

      - name: Run health probes
        env:
          # Cloud DB credentials
          NEO4J_URI:        ${{ secrets.NEO4J_URI }}
          NEO4J_USER:       ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD:   ${{ secrets.NEO4J_PASSWORD }}
          CHROMA_API_KEY:   ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT:    ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE:  ${{ secrets.CHROMA_DATABASE }}

          # LLM / search APIs
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY:   ${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY:   ${{ secrets.TAVILY_API_KEY }}
        run: |
          # Need `-m integration` here because the test_health_check tests are
          # marked integration so they're skipped in regular CI. This workflow
          # is the one place we deliberately want them to run.
          pytest -m integration -v --tb=short \
            scraper_preprocessing_memory/tests/test_health_check.py
