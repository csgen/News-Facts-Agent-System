# Standalone fact-check workflow — runs independently of the scraper.
#
# Triggered manually from the Actions tab. Verifies pending claims within
# a configurable lookback window, capped by FACT_CHECK_MAX_CLAIMS.
#
# Unlike the combined scrape workflow, this does NOT fetch new articles.
# Use it to re-process claims that failed, or to run fact-check on its
# own schedule.

name: Fact-Check Pipeline

on:
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Process claims extracted within this many hours'
        required: false
        default: '24'
      max_claims:
        description: 'Max claims to verify (overrides FACT_CHECK_MAX_CLAIMS repo variable)'
        required: false
        default: ''

concurrency:
  group: fact-check
  cancel-in-progress: false

jobs:
  fact_check:
    name: Fact-check unverified claims
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12 with pip cache
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential gcc

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run fact-check pipeline
        working-directory: FakeNewsAgent
        env:
          # ── DB (cloud) ─────────────────────────────────────
          NEO4J_URI:           ${{ secrets.NEO4J_URI }}
          NEO4J_USER:          ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD:      ${{ secrets.NEO4J_PASSWORD }}
          CHROMA_API_KEY:      ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT:       ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE:     ${{ secrets.CHROMA_DATABASE }}

          # ── LLM / embeddings ──────────────────────────────
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY:      ${{ secrets.GOOGLE_API_KEY }}

          # ── Live search ───────────────────────────────────
          TAVILY_API_KEY:      ${{ secrets.TAVILY_API_KEY }}

          # ── Observability (optional) ──────────────────────
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST:       ${{ secrets.LANGFUSE_HOST }}

          # ── Model defaults ────────────────────────────────
          EMBEDDING_MODEL: gemini-embedding-001
          EMBEDDING_DIM:   1536
          LLM_MODEL:       gpt-4o-mini
          VISION_MODEL:    gpt-4o

          # ── Pipeline caps ────────────────────────────────
          FACT_CHECK_MAX_CLAIMS: ${{ github.event.inputs.max_claims || vars.FACT_CHECK_MAX_CLAIMS || '10' }}
        run: |
          echo "Starting fact-check pipeline at $(date -u)"
          python fact_check_pipeline.py --lookback-hours ${{ github.event.inputs.lookback_hours }}
          echo "Finished fact-check pipeline at $(date -u)"
