# Continuous Integration: lint + unit tests on every push and PR.
#
# Runs only NON-integration tests (i.e. anything not marked @pytest.mark.integration
# and any test that isn't auto-skipped via @pytest.mark.skipif on missing API keys).
# Integration tests live in the separate scrape.yml + (future) integration.yml.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}    # allow manual triggering from the Actions tab

# Cancel an in-flight CI run when a new commit is pushed to the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Fast lint pass ─────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install 'ruff>=0.4,<1.0'

      - name: Lint
        run: ruff check .

  # ── 2. Unit tests (skip integration / live-API tests) ─────────────────────
  test:
    name: Unit tests (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12 with pip cache
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system build deps (for spaCy + lxml)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential gcc

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run unit tests with coverage
        env:
          # Placeholder values so pydantic-Settings doesn't raise on import.
          # Tests that actually need real keys are decorated with skipif.
          NEO4J_URI:        "bolt://localhost:7687"
          NEO4J_USER:       "neo4j"
          NEO4J_PASSWORD:   "test_unused"
          OPENAI_API_KEY:   "sk-test-unused"
          GOOGLE_API_KEY:   ""
          CHROMA_API_KEY:   ""
          CHROMA_HOST:      ""
          TAVILY_API_KEY:   ""
        run: |
          # `-m "not integration"` skips tests marked @pytest.mark.integration.
          # Tests marked @pytest.mark.skipif(not OPENAI_API_KEY) etc. auto-skip
          # because the env vars above are placeholders / blank.
          # --cov scoped to our three subfolders so we don't measure coverage
          # of stdlib / third-party deps. Term report shows %; XML upload-able.
          pytest -m "not integration" -v --tb=short \
            --cov=scraper_preprocessing_memory/src \
            --cov=FakeNewsAgent/fact_check_agent/src \
            --cov=PredictionAgent/agents \
            --cov-report=term \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report (artifact, 14-day retention)
        if: always()    # upload even if tests failed, so we can inspect why
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
      
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
