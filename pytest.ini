[pytest]
# Top-level pytest config for the integrated monorepo.
# pythonpath mirrors the Dockerfile's PYTHONPATH so tests run identically
# in CI, locally, and inside the container.
pythonpath =
    scraper_preprocessing_memory
    scraper_preprocessing_memory/src
    FakeNewsAgent
    PredictionAgent

testpaths =
    scraper_preprocessing_memory/tests
    FakeNewsAgent/fact_check_agent/tests
    PredictionAgent/tests

# Custom markers (declare to silence "unknown marker" warnings).
markers =
    integration: tests that need live external services (Neo4j, ChromaDB, OpenAI, Tavily, Langfuse). Skipped in CI by default; run with `pytest -m integration`.
    mocked_integration: integration tests that mock external APIs (respx) but use real DB sidecars (testcontainers). Run on every PR alongside unit tests.
    requires_ollama: tests that need a local Ollama server. Auto-skip if unavailable.

# Don't collect ROS / colcon plugins that some hosts inject.
addopts =
    -p no:launch_testing
    -p no:launch_testing_ros
    -p no:launch_testing_ros_pytest_entrypoint
    -p no:ament_pep257
    -p no:ament_copyright
    -p no:ament_xmllint
    -p no:ament_lint
    -p no:ament_flake8
    -p no:colcon_core
