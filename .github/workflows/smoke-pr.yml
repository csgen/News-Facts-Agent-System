# Smoke test on pull requests — same 4 checks as release-image.yml runs after
# publishing, but executed against a LOCALLY-built image (no push to GHCR).
#
# Lets contributors catch image-level breakage on the PR itself instead of
# discovering it after merge to main. release-image.yml still runs after
# merge to validate the published artifact, but by then the PR has already
# proven the image builds and the four smokes pass.
#
# Why not just add `pull_request` to release-image.yml:
#   - We don't want every PR pushing throwaway `:sha-xxx` tags to GHCR
#   - Cross-job artifact passing (build → smoke on different runners) is
#     awkward; doing build+smoke in ONE workflow keeps it simple
#
# Cost: ~5-10 min per triggering PR (image build dominates). Path filter
# below ensures it only fires when something that affects the image changes.

name: Smoke test (PR)

on:
  pull_request:
    branches: [main]
    paths:
      # Only run smoke when something that ends up IN the image changes.
      # Editing READMEs, tests/, or other workflow files shouldn't burn 10
      # minutes on a smoke run.
      - 'docker/Dockerfile'
      - 'requirements.txt'
      - 'scraper_preprocessing_memory/**'
      - 'FakeNewsAgent/**'
      - 'PredictionAgent/**'
      - '.github/workflows/smoke-pr.yml'
  workflow_dispatch: {}    # manual trigger from the Actions tab

# A new push to the same PR cancels any in-flight smoke run on the previous
# commit — saves runner minutes during rapid PR iteration.
concurrency:
  group: smoke-pr-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Build image + smoke (no push)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      neo4j:
        image: neo4j:5-community
        ports: ['7687:7687']
        env:
          NEO4J_AUTH: neo4j/smoketest123
        options: >-
          --health-cmd "cypher-shell -u neo4j -p smoketest123 'RETURN 1'"
          --health-interval 5s
          --health-retries 30
          --health-timeout 5s

      chroma:
        image: chromadb/chroma:latest
        ports: ['8000:8000']
        # Intentionally NO --health-cmd: chromadb/chroma:latest has no curl,
        # and the heartbeat path moved between v1 → v2. We poll explicitly
        # in the "Wait for Chroma" step below.

    env:
      IMAGE: news_facts_system:pr-smoke
      # Sidecar service ports map to localhost on the runner; --network host
      # lets our smoke containers reach them via the same hostname.
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: smoketest123
      CHROMA_HOST: localhost
      CHROMA_PORT: '8000'
      OPENAI_API_KEY: dummy-not-used
      GOOGLE_API_KEY: dummy-not-used

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image locally (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          # `load: true` puts the image into the runner's Docker daemon so
          # `docker run` in later steps can find it.
          # `push: false` is the whole point of this workflow.
          push: false
          load: true
          tags: ${{ env.IMAGE }}
          # Reuse the cache layer that release-image.yml warmed on `main` —
          # most PRs only invalidate the COPY layers, so deps are cached.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Wait for Chroma to be ready (heartbeat poll)
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/api/v2/heartbeat >/dev/null 2>&1 \
               || curl -fsS http://localhost:8000/api/v1/heartbeat >/dev/null 2>&1; then
              echo "Chroma is ready (after ${i} polls)"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Chroma did not become ready within 120s"
          docker ps --filter "ancestor=chromadb/chroma:latest" --format '{{.ID}}' \
            | xargs -r -I{} docker logs --tail 50 {}
          exit 1

      - name: Smoke 1 — imports work in the container
        run: |
          docker run --rm \
            -e NEO4J_URI -e NEO4J_USER -e NEO4J_PASSWORD \
            -e CHROMA_HOST -e CHROMA_PORT \
            -e OPENAI_API_KEY -e GOOGLE_API_KEY \
            "$IMAGE" python -c "
          from src.memory.agent import MemoryAgent
          from agents.fact_check_agent import fact_check_claim
          from agents.memory_agent import get_memory
          print('IMPORT OK')
          "

      - name: Smoke 2 — schema init against sidecar Neo4j
        run: |
          docker run --rm --network host \
            -e NEO4J_URI -e NEO4J_USER -e NEO4J_PASSWORD \
            -e CHROMA_HOST -e CHROMA_PORT \
            -e OPENAI_API_KEY -e GOOGLE_API_KEY \
            "$IMAGE" python -c "
          from src.config import settings
          from src.memory.agent import MemoryAgent
          MemoryAgent(settings).init_schema()
          print('SCHEMA OK')
          "

      - name: Smoke 3 — round-trip write/read on Neo4j + Chroma
        run: |
          docker run --rm --network host \
            -e NEO4J_URI -e NEO4J_USER -e NEO4J_PASSWORD \
            -e CHROMA_HOST -e CHROMA_PORT \
            -e OPENAI_API_KEY -e GOOGLE_API_KEY \
            "$IMAGE" python -c "
          from src.config import settings
          from src.memory.agent import MemoryAgent
          m = MemoryAgent(settings)
          m._graph.ensure_entity_exists('SmokeTestEntity')
          ent = m.get_entity_by_name('SmokeTestEntity')
          assert ent is not None and ent['name'].lower() == 'smoketestentity', ent
          print('ROUND-TRIP OK')
          "

      - name: Smoke 4 — Streamlit health endpoint
        run: |
          docker run -d --name nfs-smoke-ui --network host \
            -e NEO4J_URI -e NEO4J_USER -e NEO4J_PASSWORD \
            -e CHROMA_HOST -e CHROMA_PORT \
            -e OPENAI_API_KEY -e GOOGLE_API_KEY \
            "$IMAGE" sh -c "cd /app/PredictionAgent && streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true"

          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8501/_stcore/health >/dev/null 2>&1; then
              echo "STREAMLIT OK"
              docker stop nfs-smoke-ui >/dev/null
              exit 0
            fi
            sleep 2
          done
          echo "::error::Streamlit failed to boot"
          docker logs nfs-smoke-ui
          docker stop nfs-smoke-ui >/dev/null
          exit 1
