[pytest]
# In the integrated monorepo, the top-level ../pytest.ini wins when pytest
# is invoked from the repo root. This file is kept so `cd FakeNewsAgent && pytest`
# also works (handy for IDE test runners that scope to a subfolder).
testpaths = fact_check_agent/tests
pythonpath =
    ../scraper_preprocessing_memory
    ../scraper_preprocessing_memory/src
    .
markers =
    integration: tests that need live external services (Neo4j, ChromaDB, OpenAI, Tavily).
    requires_ollama: tests that need a local Ollama server.
addopts =
    -p no:launch_testing
    -p no:launch_testing_ros
    -p no:launch_testing_ros_pytest_entrypoint
    -p no:ament_pep257
    -p no:ament_copyright
    -p no:ament_xmllint
    -p no:ament_lint
    -p no:ament_flake8
    -p no:colcon_core
