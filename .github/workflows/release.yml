# Create a GitHub Release on tag push, with an auto-generated changelog.
#
# This complements `release-image.yml`: that builds + tags the image, this
# creates the human-readable release notes page so your professor / teammates
# can scan what changed at a glance.
#
# To cut a release:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Both workflows fire in parallel: the image registry gets `:v0.1.0`, and
# the Releases tab gets a new entry with the changelog.

name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write    # needed to create the GitHub Release

jobs:

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog from commits
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          # Group commits by conventional-commit prefix (feat, fix, etc.).
          # If you don't follow conventional commits, this still produces a
          # flat list of commit subjects under "Other Changes".
          configurationJson: |
            {
              "categories": [
                {"title": "## ✨ Features",     "labels": ["feature"], "rules": [{"pattern": "^feat", "on_property": "title"}]},
                {"title": "## 🐛 Fixes",        "labels": ["bug"],     "rules": [{"pattern": "^fix",  "on_property": "title"}]},
                {"title": "## 🛠 CI / Build",   "labels": ["ci"],      "rules": [{"pattern": "^(ci|build|chore)", "on_property": "title"}]},
                {"title": "## 📝 Docs",         "labels": ["docs"],    "rules": [{"pattern": "^docs", "on_property": "title"}]},
                {"title": "## 🔄 Other",        "labels": []}
              ],
              "template": "#{{CHANGELOG}}\n\n**Image**: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`\n**Compare**: #{{RELEASE_DIFF}}"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          # Mark as draft=false so it shows up immediately. Toggle prerelease
          # via the tag itself (e.g. `v0.1.0-rc1`) if needed.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
